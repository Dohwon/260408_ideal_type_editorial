<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ideal Type Editorial Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .admin-shell { width:min(1320px, calc(100vw - 32px)); margin:0 auto; padding:32px 0 60px; }
      .admin-login, .admin-card { background:rgba(255,255,255,.88); border:1px solid rgba(96,67,57,.08); border-radius:28px; padding:24px; box-shadow:var(--shadow); }
      .admin-login { max-width:520px; margin:64px auto 0; display:grid; gap:16px; }
      .admin-top { display:flex; justify-content:space-between; gap:16px; align-items:center; margin-bottom:24px; }
      .admin-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
      .admin-card { display:grid; gap:16px; }
      .admin-card h3, .admin-section h3 { margin:0; font-family:"Plus Jakarta Sans",sans-serif; font-size:24px; font-weight:800; letter-spacing:-.04em; }
      .admin-meta { display:flex; flex-wrap:wrap; gap:10px; }
      .admin-field { display:grid; gap:8px; }
      .admin-field label { color:var(--muted); font-size:13px; font-weight:700; }
      .admin-field textarea, .admin-field select, .admin-login input { width:100%; border:1px solid rgba(96,67,57,.12); border-radius:16px; background:rgba(255,255,255,.92); padding:12px 14px; font:inherit; }
      .candidate-list { display:grid; gap:8px; max-height:220px; overflow:auto; padding-right:4px; }
      .candidate-item { display:grid; grid-template-columns:20px minmax(0,1fr); gap:10px; align-items:start; padding:10px 12px; border-radius:14px; background:rgba(164,73,64,.05); }
      .admin-actions { display:flex; flex-wrap:wrap; gap:10px; }
      .admin-table-wrap { overflow:auto; }
      .admin-table { width:100%; border-collapse:collapse; }
      .admin-table th, .admin-table td { text-align:left; padding:12px 10px; border-bottom:1px solid rgba(96,67,57,.08); font-size:14px; }
      .admin-empty { padding:24px; border:1px dashed rgba(96,67,57,.16); border-radius:18px; color:var(--muted); }
      .admin-section { display:grid; gap:16px; margin-top:24px; }
      @media (max-width: 980px) { .admin-grid { grid-template-columns:1fr; } .admin-top { flex-direction:column; align-items:flex-start; } }
    </style>
  </head>
  <body>
    <div id="admin-app"></div>
    <script type="module" src="/admin.js"></script>
  </body>
</html>
